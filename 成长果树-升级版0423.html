<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成长果树 Pro 🌳</title>
<style>
body{margin:0;font-family:Microsoft YaHei,Segoe UI;background:#fff8e1;display:flex;height:100vh}
.sidebar{width:120px;background:#fff3cd;padding:10px;overflow-y:auto}
.sidebar div{padding:6px;border-radius:6px;margin-bottom:5px;cursor:pointer}
.sidebar div:hover{background:#ffe0b2}
.container{flex:1;max-width:600px;margin:auto;background:#fff;border-radius:20px;padding:15px}
h1{text-align:center;color:#ffb74d;font-size:20px}
.input{display:flex;gap:6px;margin-bottom:10px}
input{flex:1;padding:6px;border-radius:8px;border:1px solid #ddd}
button{border:none;border-radius:8px;padding:6px 10px;cursor:pointer;background:#ffb74d;color:#fff}
button:disabled{background:#ccc}
.treeBox{display:flex;justify-content:center;align-items:center;margin:10px 0;position:relative;height:200px}
.tree{font-size:120px}
.fruits{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;flex-wrap:wrap;width:160px;justify-content:center}
.fruit{width:32px;height:32px;border-radius:50%;margin:3px;display:flex;align-items:center;justify-content:center;font-size:16px}
.grow{background:#cfd8dc}
.done{background:#ff7043;color:#fff}
.section{margin-top:10px}
.item{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}
.summary{text-align:center;margin-top:10px;display:none}
.tip{font-size:12px;color:#888}
.card{background:#fff3cd;border-radius:12px;padding:10px;margin-top:10px;text-align:center}
</style>
</head>
<body>

<div class="sidebar" id="dates"></div>

<div class="container">
<h1>🌳 今日成长果树</h1>
<div class="tip" id="reminder"></div>

<div class="input" id="inputBox">
<input id="task" placeholder="任务">
<input id="time" type="number" placeholder="分钟">
<button onclick="add()">添加</button>
</div>

<div class="treeBox">
<div class="tree">🌳</div>
<div class="fruits" id="tree"></div>
</div>

<div class="section">
<b>📋 今日任务</b>
<div id="list"></div>
</div>

<div class="section" id="carryBox" style="display:none">
<b>🌱 本周未完成任务</b>
<div id="carry"></div>
</div>

<div class="section" id="stats"></div>

<div class="card" id="weekCard" style="display:none"></div>

<div class="summary" id="summary"></div>
</div>

<script>
const todayKey=new Date().toISOString().slice(0,10);
let data=JSON.parse(localStorage.getItem('forest')||'{}');
if(!data[todayKey]) data[todayKey]=[];
let currentDay=todayKey;

function save(){localStorage.setItem('forest',JSON.stringify(data))}

function add(){
 if(currentDay!==todayKey) return;
 const name=document.getElementById('task').value;
 const time=document.getElementById('time').value;
 if(!name||!time)return;
 data[todayKey].push({id:Date.now(),name,time,done:false,finish:null});
 save();render();
 document.getElementById('task').value='';
 document.getElementById('time').value='';
}

function toggle(id){
 if(currentDay!==todayKey) return;
 const t=data[currentDay].find(x=>x.id===id);
 t.done=!t.done;
 if(t.done){
  const d=new Date();
  t.finish=d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
 }
 save();render();
}

function renderDates(){
 const box=document.getElementById('dates');
 box.innerHTML='';
 Object.keys(data).sort().reverse().forEach(d=>{
  const div=document.createElement('div');
  div.innerText=d;
  div.onclick=()=>{currentDay=d;render();};
  box.appendChild(div);
 });
}

function render(){
 renderDates();
 const tasks=data[currentDay]||[];
 const tree=document.getElementById('tree');
 const list=document.getElementById('list');
 tree.innerHTML='';
 list.innerHTML='';

 document.getElementById('inputBox').style.display = currentDay===todayKey ? 'flex':'none';

 let doneCount=0;

 tasks.forEach(t=>{
  if(t.done) doneCount++;

  const f=document.createElement('div');
  f.className='fruit '+(t.done?'done':'grow');
  f.innerHTML=t.done?'🍎':'🍏';
  if(currentDay===todayKey) f.onclick=()=>toggle(t.id);
  tree.appendChild(f);

  const item=document.createElement('div');
  item.className='item';
  item.innerHTML=`<span>${t.name}（${t.time}分钟）</span><span>${t.done?'✅ '+t.finish:'🌱'}</span>`;
  list.appendChild(item);
 });

 // 历史未完成
 let undoneTasks=[];
 Object.keys(data).forEach(d=>{
  if(d<todayKey){
    data[d].forEach(t=>{if(!t.done)undoneTasks.push({...t,date:d})});
  }
 });

 const reminder=document.getElementById('reminder');
 if(undoneTasks.length && currentDay===todayKey){
  reminder.innerHTML=`🌱 有${undoneTasks.length}个任务还在成长中 <button onclick="showCarry()">查看</button>`;
 }else{reminder.innerText='';}

 window.carryList=undoneTasks;

 // 统计
 let weekDone=0,weekUndone=0;
 const now=new Date();
 const day=now.getDay()||7;
 const first=new Date(now.setDate(now.getDate()-day+1));
 const weekStart=first.toISOString().slice(0,10);
 Object.keys(data).forEach(d=>{
  if(d>=weekStart){
    data[d].forEach(t=>{
      if(t.done)weekDone++; else weekUndone++;
    })
  }
 });
 document.getElementById('stats').innerHTML=`📊 今日完成：${doneCount}/${tasks.length}<br>📊 本周🍎：${weekDone} ｜ 🌱：${weekUndone}`;

 // 周日总结
 const today=new Date();
 if(today.getDay()===0 && currentDay===todayKey){
  document.getElementById('weekCard').style.display='block';
  document.getElementById('weekCard').innerHTML=`🌳 本周果园总结<br><br>🍎 收获：${weekDone} 颗<br>🌱 还在成长：${weekUndone} 颗<br><br>你这周很稳定 👍`;
 }else{
  document.getElementById('weekCard').style.display='none';
 }

 // 完成总结
 if(currentDay===todayKey && tasks.length && doneCount===tasks.length){
  const p=["今天很专注 👍","你坚持完成了 💪","状态很好 🌟"];
  const text=p[Math.floor(Math.random()*p.length)];
  const d=new Date();
  document.getElementById('summary').style.display='block';
  document.getElementById('summary').innerHTML=`🎉 完成！<br>${text}<br>⏰ ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}<br>可以去玩啦`;
 }else{
  document.getElementById('summary').style.display='none';
 }
}

function showCarry(){
 const box=document.getElementById('carryBox');
 const list=document.getElementById('carry');
 list.innerHTML='';
 window.carryList.forEach(t=>{
  const div=document.createElement('div');
  div.className='item';
  div.innerHTML=`<span>📅 ${t.date}：${t.name}</span><button onclick="addCarry('${t.name}',${t.time})">加入今天</button>`;
  list.appendChild(div);
 });
 box.style.display='block';
}

function addCarry(name,time){
 data[todayKey].push({id:Date.now(),name,time,done:false,finish:null});
 save();render();
}

render();
</script>

</body>
</html>
